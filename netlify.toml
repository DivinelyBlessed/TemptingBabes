# ──────────────────────────────────────────────────────────────
# Netlify Configuration — temptingbabes.com
# ──────────────────────────────────────────────────────────────

[build]
  command = "node build.js"
  publish = "."

# IMPORTANT: Replace "YOUR-SITE-NAME" below with your actual Netlify
# site slug (found in Netlify dashboard → Site configuration → Site name).
# This 301 redirect prevents your netlify.app URL from creating
# duplicate content that competes with your real domain in Google.
[[redirects]]
  from   = "https://tempting-babes.netlify.app/*"
  to     = "https://www.temptingbabes.com/:splat"
  status = 301
  force  = true

# ── Security headers on every page ───────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "SAMEORIGIN"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"

# ── Long-lived cache for images & videos ─────────────────────
[[headers]]
  for = "/Asset/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Long-lived cache for CSS & JS ────────────────────────────
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# ── Short cache for crawl-discovery files ────────────────────
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── GPC signal file ──────────────────────────────────────────
[[headers]]
  for = "/.well-known/gpc.json"
  [headers.values]
    Content-Type  = "application/json"
    Cache-Control = "public, max-age=86400"
    Access-Control-Allow-Origin = "*"
